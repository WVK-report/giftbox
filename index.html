<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>선물상자 이벤트</title>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { display: flex; justify-content: center; align-items: center; background: #111; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    .phone { position: relative; width: 100vw; max-width: 430px; height: 100vh; overflow: hidden; background-image: url('https://i.imgur.com/KASJTsw.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .phone::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.18); z-index: 0; }
    #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; overflow: hidden; }
    @keyframes confettiFall { 0%{transform:translateY(-30px) rotate(0deg);opacity:1;} 50%{transform:translateY(50vh) rotate(400deg);opacity:1;} 100%{transform:translateY(115vh) rotate(720deg);opacity:0;} }
    .confetti-piece { position: absolute; top: -30px; opacity: 0; animation: confettiFall linear forwards; }

    .product-item { position: absolute; width: 110px; height: 110px; object-fit: contain; z-index: 30; pointer-events: none; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)); opacity: 0; }
    @keyframes flyOut1 { 0%{transform:translate(0,0) rotate(0deg) scale(0);opacity:0;} 50%{transform:translate(-130px,-80px) rotate(-20deg) scale(1.3);opacity:1;} 75%{transform:translate(-110px,-60px) rotate(-15deg) scale(1.1);opacity:1;} 100%{transform:translate(-115px,-65px) rotate(-15deg) scale(1.1);opacity:1;} }
    @keyframes flyOut2 { 0%{transform:translate(0,0) rotate(0deg) scale(0);opacity:0;} 50%{transform:translate(130px,-90px) rotate(22deg) scale(1.3);opacity:1;} 75%{transform:translate(110px,-70px) rotate(18deg) scale(1.1);opacity:1;} 100%{transform:translate(115px,-72px) rotate(18deg) scale(1.1);opacity:1;} }
    @keyframes flyOut3 { 0%{transform:translate(0,0) rotate(0deg) scale(0);opacity:0;} 50%{transform:translate(-70px,-200px) rotate(12deg) scale(1.3);opacity:1;} 75%{transform:translate(-55px,-175px) rotate(8deg) scale(1.1);opacity:1;} 100%{transform:translate(-58px,-178px) rotate(8deg) scale(1.1);opacity:1;} }
    @keyframes flyOut4 { 0%{transform:translate(0,0) rotate(0deg) scale(0);opacity:0;} 50%{transform:translate(75px,-210px) rotate(-18deg) scale(1.3);opacity:1;} 75%{transform:translate(60px,-185px) rotate(-14deg) scale(1.1);opacity:1;} 100%{transform:translate(62px,-188px) rotate(-14deg) scale(1.1);opacity:1;} }
    .prod-anim-1 { animation: flyOut1 0.9s cubic-bezier(0.175,0.885,0.32,1.275) 0.2s both; }
    .prod-anim-2 { animation: flyOut2 0.9s cubic-bezier(0.175,0.885,0.32,1.275) 0.38s both; }
    .prod-anim-3 { animation: flyOut3 0.9s cubic-bezier(0.175,0.885,0.32,1.275) 0.55s both; }
    .prod-anim-4 { animation: flyOut4 0.9s cubic-bezier(0.175,0.885,0.32,1.275) 0.72s both; }

    .content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 24px 32px; text-align: center; }
    .box-wrap { width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; margin-bottom: 28px; position: relative; }
    .box-img { width: 260px; height: 260px; object-fit: contain; }
    @keyframes shake { 0%{transform:rotate(0deg) translateY(0px) scale(1);} 10%{transform:rotate(-5deg) translateY(-6px) scale(1.03);} 20%{transform:rotate(5deg) translateY(-11px) scale(1.05);} 30%{transform:rotate(-7deg) translateY(-6px) scale(1.05);} 40%{transform:rotate(7deg) translateY(-13px) scale(1.07);} 50%{transform:rotate(-8deg) translateY(-6px) scale(1.07);} 60%{transform:rotate(8deg) translateY(-13px) scale(1.08);} 70%{transform:rotate(-7deg) translateY(-6px) scale(1.07);} 80%{transform:rotate(5deg) translateY(-8px) scale(1.05);} 90%{transform:rotate(-3deg) translateY(-3px) scale(1.02);} 100%{transform:rotate(0deg) translateY(0px) scale(1);} }
    @keyframes popIn { 0%{transform:scale(0.1) rotate(-15deg);opacity:0;} 55%{transform:scale(1.22) rotate(4deg);opacity:1;} 78%{transform:scale(0.93) rotate(-2deg);} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
    @keyframes fadeUp { 0%{opacity:0;transform:translateY(18px);} 100%{opacity:1;transform:translateY(0);} }
    .anim-shake { animation: shake 1.3s ease-in-out forwards; }
    .anim-pop { animation: popIn 0.7s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
    .banner-text { font-size: 18px; line-height: 1.8; color: #fff; font-weight: 700; margin-bottom: 32px; word-break: keep-all; text-shadow: 0 2px 8px rgba(0,0,0,0.55); }
    .banner-text .sub { display: block; font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.75); margin-top: 6px; }
    .result-title { font-size: 36px; font-weight: 900; margin-bottom: 10px; animation: fadeUp 0.5s ease forwards; }
    .result-title.win { color: #FFD700; text-shadow: 0 2px 16px rgba(255,215,0,0.7); }
    .result-title.lose { color: #ccc; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .result-sub { font-size: 16px; color: rgba(255,255,255,0.92); line-height: 1.7; margin-bottom: 24px; word-break: keep-all; text-shadow: 0 1px 4px rgba(0,0,0,0.45); animation: fadeUp 0.5s 0.25s ease both; }
    .btn { background: #FEE500; color: #3B1E08; border: none; border-radius: 16px; padding: 18px 28px; font-size: 17px; font-weight: 800; cursor: pointer; width: 100%; max-width: 320px; box-shadow: 0 6px 20px rgba(0,0,0,0.28); transition: transform 0.12s, box-shadow 0.12s; letter-spacing: -0.3px; }
    .btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .btn-group { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
    .hidden { display: none !important; }
    .step { width: 100%; display: flex; flex-direction: column; align-items: center; }

    /* 폼 스타일 */
    .form-wrap { width: 100%; max-width: 360px; background: rgba(255,255,255,0.97); border-radius: 20px; padding: 24px 20px; overflow-y: auto; max-height: 85vh; }
    .form-title { font-size: 18px; font-weight: 800; color: #222; margin-bottom: 4px; text-align: center; }
    .form-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; border: 1.5px solid #ddd; border-radius: 10px; padding: 11px 14px; font-size: 14px; outline: none; transition: border 0.2s; }
    .form-input:focus { border-color: #FEE500; }
    .school-result { border: 1.5px solid #ddd; border-radius: 10px; max-height: 160px; overflow-y: auto; margin-top: 4px; background: #fff; display: none; }
    .school-item { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
    .school-item:hover { background: #fffbe6; }
    .school-item:last-child { border-bottom: none; }
    .school-selected { background: #fffbe6 !important; border-color: #FEE500 !important; }
    .size-note { font-size: 11px; color: #e67e22; margin-top: 4px; }
    .consent-wrap { display: flex; align-items: flex-start; gap: 8px; margin-top: 4px; }
    .consent-wrap input[type=checkbox] { margin-top: 3px; width: 16px; height: 16px; flex-shrink: 0; }
    .consent-text { font-size: 12px; color: #666; line-height: 1.5; }
    .submit-btn { width: 100%; background: #FEE500; color: #3B1E08; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* 완료 화면 */
    .done-wrap { width: 100%; max-width: 360px; background: rgba(255,255,255,0.97); border-radius: 20px; padding: 36px 24px; text-align: center; }
    .done-emoji { font-size: 56px; margin-bottom: 16px; }
    .done-title { font-size: 22px; font-weight: 900; color: #222; margin-bottom: 10px; }
    .done-sub { font-size: 14px; color: #666; line-height: 1.7; }
  </style>
</head>
<body>
<div class="phone">
  <div id="confetti-container"></div>
  <div class="content">

    <!-- 배너 -->
    <div class="step" id="step-banner">
      <div class="box-wrap">
        <img class="box-img" src="https://i.imgur.com/pqUst9E.jpg" alt="선물상자"/>
      </div>
      <p class="banner-text">
        이 상자, 우리 반 전원의<br>선물일지도 몰라요.
        <span class="sub">공유하고 열어보세요 🎁</span>
      </p>
      <button class="btn" onclick="doKakaoShare()">카카오톡으로 공유하기</button>
    </div>

    <!-- 공유 확인 -->
    <div class="step hidden" id="step-confirm">
      <div class="box-wrap">
        <img class="box-img" src="https://i.imgur.com/pqUst9E.jpg" alt="선물상자"/>
      </div>
      <p class="banner-text">
        친구에게 공유했나요? 🎁
        <span class="sub">전송 후 아래 버튼을 눌러주세요</span>
      </p>
      <button class="btn" onclick="openBox()">네! 상자 열어보기 💛</button>
    </div>

    <!-- 흔들기 -->
    <div class="step hidden" id="step-shake">
      <div class="box-wrap">
        <img class="box-img" id="box-shaking" src="https://i.imgur.com/pqUst9E.jpg" alt="흔들리는 상자"/>
      </div>
      <p class="banner-text">두근두근...! 🎁</p>
    </div>

    <!-- 열리는 중 -->
    <div class="step hidden" id="step-opening">
      <div class="box-wrap">
        <img class="box-img anim-pop" id="img-opening" src="https://i.imgur.com/tYowSVy.jpg" alt="열리는 상자"/>
      </div>
      <p class="banner-text">열리고 있어요...! ✨</p>
    </div>

    <!-- 결과 -->
    <div class="step hidden" id="step-result">
      <div class="box-wrap" id="result-box-wrap">
        <img class="box-img" id="result-img" src="https://i.imgur.com/Nr2I9JG.jpg" alt="결과"/>
        <img class="product-item" id="prod1" src="https://i.imgur.com/swGtqVA.jpg" alt="상품1"/>
        <img class="product-item" id="prod2" src="https://i.imgur.com/oJHpVTW.jpg" alt="상품2"/>
        <img class="product-item" id="prod3" src="https://i.imgur.com/M75X3ci.jpg" alt="상품3"/>
        <img class="product-item" id="prod4" src="https://i.imgur.com/EomEFhr.jpg" alt="상품4"/>
      </div>
      <p class="result-title" id="result-title"></p>
      <p class="result-sub" id="result-sub"></p>
      <div class="btn-group hidden" id="btn-win-group">
        <button class="btn" onclick="showForm()">선물 받기 신청 💛</button>
      </div>
      <div class="btn-group hidden" id="btn-lose-group">
        <button class="btn" onclick="doKakaoShare()">한 번 더 공유하기</button>
      </div>
    </div>

    <!-- 신청 폼 -->
    <div class="step hidden" id="step-form">
      <div class="form-wrap">
        <p class="form-title">🎁 선물 받기 신청</p>
        <p class="form-sub">아래 정보를 입력해 주세요</p>

        <div class="form-group">
          <label class="form-label">학교 검색</label>
          <input class="form-input" id="school-input" type="text" placeholder="학교 이름을 입력하세요" oninput="onSchoolInput(this.value)" autocomplete="off"/>
          <div class="school-result" id="school-result"></div>
          <input type="hidden" id="school-name"/>
          <input type="hidden" id="school-code"/>
          <input type="hidden" id="school-region"/>
          <input type="hidden" id="school-address"/>
        </div>

        <div class="form-group">
          <label class="form-label">학년</label>
          <select class="form-input" id="grade">
            <option value="">선택하세요</option>
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
            <option value="4">4학년</option>
            <option value="5">5학년</option>
            <option value="6">6학년</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">반</label>
          <input class="form-input" id="class-num" type="number" placeholder="예) 3" min="1" max="20"/>
        </div>

        <div class="form-group">
          <label class="form-label">학급 인원수</label>
          <input class="form-input" id="class-size" type="number" placeholder="예) 23" min="1" max="35"/>
          <p class="size-note">⚠️ 최대 35명까지 입력 가능합니다. 선물은 실제 재적 학생 수 기준으로 발송됩니다.</p>
        </div>

        <div class="form-group">
          <label class="form-label">보호자 이름</label>
          <input class="form-input" id="parent-name" type="text" placeholder="이름을 입력하세요"/>
        </div>

        <div class="form-group">
          <label class="form-label">연락처</label>
          <input class="form-input" id="phone" type="tel" placeholder="010-0000-0000" oninput="formatPhone(this)"/>
        </div>

        <div class="form-group">
          <div class="consent-wrap">
            <input type="checkbox" id="consent"/>
            <label class="consent-text" for="consent">
              개인정보 수집 및 이용에 동의합니다. 수집된 정보는 선물 발송 목적으로만 사용되며, 발송 완료 후 즉시 파기됩니다.
            </label>
          </div>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitForm()">선물 받기 신청 완료</button>
      </div>
    </div>

    <!-- 완료 화면 -->
    <div class="step hidden" id="step-done">
      <div class="done-wrap">
        <div class="done-emoji">🎉</div>
        <p class="done-title">신청이 완료됐어요!</p>
        <p class="done-sub">
          선생님을 통해 선물이 전달될 예정이에요.<br>
          조금만 기다려 주세요 💛
        </p>
      </div>
    </div>

  </div>
</div>

<script>
  // ── 초기화 ───────────────────────────────────────
  Kakao.init('2a06402bffbfd011de0c92d6a8a3989a');

  // URL 파라미터에서 결과 페이지 URL과 썸네일 읽기
  const params = new URLSearchParams(window.location.search);
  const FROM_URL = decodeURIComponent(params.get('from') || 'https://wvhomelh.lovable.app/result');
  const THUMB_URL = decodeURIComponent(params.get('thumb') || 'https://i.imgur.com/uZCgz5i.jpeg');

  const NEIS_KEY = '2c0ab4a2586640de86a6f78b8ced2ad3';
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzY7MJXVY5Av9_gKbWHxK_tsg_7H_agGp3LOsFg3GjaPcbbbg6vkv0fBysvWMYSHru2xQ/exec';

  // ── 유틸 ─────────────────────────────────────────
  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  // ── 카카오 공유 ───────────────────────────────────
  function doKakaoShare() {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: '우리 아이랑 나는 어떤 마음 유형일까요? 🦁',
        description: '서로 다른 마음 표현 방식, 테스트로 알아보고 선물상자도 열어보세요!',
        imageUrl: THUMB_URL,
        link: {
          mobileWebUrl: FROM_URL,
          webUrl: FROM_URL
        }
      },
      buttons: [
        {
          title: '자세히 보기',
          link: { mobileWebUrl: FROM_URL, webUrl: FROM_URL }
        },
        {
          title: '나도 테스트하기',
          link: {
            mobileWebUrl: 'https://wvhome.lovable.app/',
            webUrl: 'https://wvhome.lovable.app/'
          }
        }
      ]
    });
    setTimeout(() => {
      hide('step-banner');
      hide('step-result');
      show('step-confirm');
    }, 1000);
  }

  // ── 상자 열기 ─────────────────────────────────────
  function openBox() {
    hide('step-confirm');
    show('step-shake');
    const shakingBox = document.getElementById('box-shaking');
    shakingBox.classList.remove('anim-shake');
    void shakingBox.offsetWidth;
    shakingBox.classList.add('anim-shake');
    setTimeout(() => {
      hide('step-shake');
      const imgOpening = document.getElementById('img-opening');
      imgOpening.classList.remove('anim-pop');
      void imgOpening.offsetWidth;
      imgOpening.classList.add('anim-pop');
      show('step-opening');
      setTimeout(() => {
        hide('step-opening');
        showResult(Math.random() < 0.5);
      }, 1000);
    }, 1400);
  }

  // ── 결과 표시 ─────────────────────────────────────
  function showResult(isWin) {
    const resultImg = document.getElementById('result-img');
    resultImg.classList.remove('anim-pop');
    void resultImg.offsetWidth;
    resultImg.classList.add('anim-pop');
    show('step-result');

    const title = document.getElementById('result-title');
    const sub = document.getElementById('result-sub');
    document.getElementById('btn-win-group').classList.add('hidden');
    document.getElementById('btn-lose-group').classList.add('hidden');

    ['prod1','prod2','prod3','prod4'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('prod-anim-1','prod-anim-2','prod-anim-3','prod-anim-4');
      el.style.opacity = '0';
    });

    if (isWin) {
      title.textContent = '🎉 당첨!';
      title.className = 'result-title win';
      sub.textContent = '우리 반 친구들 전원에게 선물이 갑니다!';
      document.getElementById('btn-win-group').classList.remove('hidden');
      setTimeout(() => {
        ['prod1','prod2','prod3','prod4'].forEach((id, i) => {
          const el = document.getElementById(id);
          void el.offsetWidth;
          el.classList.add(`prod-anim-${i+1}`);
        });
      }, 300);
      spawnConfetti();
    } else {
      title.textContent = '아쉽게도 꽝!';
      title.className = 'result-title lose';
      sub.textContent = '한 번 더 공유하면 또 기회가 생겨요 💛';
      document.getElementById('btn-lose-group').classList.remove('hidden');
    }
  }

  // ── 폼 표시 ──────────────────────────────────────
  function showForm() {
    hide('step-result');
    show('step-form');
  }

  // ── 학교 검색 ─────────────────────────────────────
  let searchTimer = null;
  function onSchoolInput(value) {
    clearTimeout(searchTimer);
    document.getElementById('school-name').value = '';
    document.getElementById('school-code').value = '';
    document.getElementById('school-region').value = '';
    document.getElementById('school-address').value = '';
    document.getElementById('school-input').classList.remove('school-selected');
    if (value.length < 2) {
      document.getElementById('school-result').style.display = 'none';
      return;
    }
    searchTimer = setTimeout(() => searchSchool(value), 400);
  }

  function searchSchool(query) {
    const url = `https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_KEY}&Type=json&pIndex=1&pSize=15&SCHUL_KND_SC_NM=초등학교&SCHUL_NM=${encodeURIComponent(query)}`;
    fetch(url)
      .then(res => res.json())
      .then(data => {
        const resultBox = document.getElementById('school-result');
        if (!data.schoolInfo) {
          resultBox.innerHTML = '<div class="school-item" style="color:#999">검색 결과가 없습니다</div>';
          resultBox.style.display = 'block';
          return;
        }
        const schools = data.schoolInfo[1].row;
        resultBox.innerHTML = schools.map(s =>
          `<div class="school-item" onclick="selectSchool('${s.SCHUL_NM}','${s.SD_SCHUL_CODE}','${s.ATPT_OFCDC_SC_NM}','${(s.ORG_RDNMA||'').replace(/'/g,"\\'")}')">
            ${s.SCHUL_NM} <span style="color:#999;font-size:12px">${s.ATPT_OFCDC_SC_NM}</span>
          </div>`
        ).join('');
        resultBox.style.display = 'block';
      })
      .catch(() => {
        const resultBox = document.getElementById('school-result');
        resultBox.innerHTML = '<div class="school-item" style="color:#999">검색 중 오류가 발생했습니다</div>';
        resultBox.style.display = 'block';
      });
  }

  function selectSchool(name, code, region, address) {
    document.getElementById('school-input').value = name;
    document.getElementById('school-input').classList.add('school-selected');
    document.getElementById('school-name').value = name;
    document.getElementById('school-code').value = code;
    document.getElementById('school-region').value = region;
    document.getElementById('school-address').value = address;
    document.getElementById('school-result').style.display = 'none';
  }

  // 외부 클릭 시 검색 결과 닫기
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#school-input') && !e.target.closest('#school-result')) {
      document.getElementById('school-result').style.display = 'none';
    }
  });

  // ── 전화번호 포맷 ─────────────────────────────────
  function formatPhone(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length <= 3) input.value = v;
    else if (v.length <= 7) input.value = v.slice(0,3) + '-' + v.slice(3);
    else input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
  }

  // ── 폼 제출 ──────────────────────────────────────
  function submitForm() {
    const school = document.getElementById('school-name').value;
    const schoolCode = document.getElementById('school-code').value;
    const region = document.getElementById('school-region').value;
    const address = document.getElementById('school-address').value;
    const grade = document.getElementById('grade').value;
    const classNum = document.getElementById('class-num').value;
    const classSize = document.getElementById('class-size').value;
    const parentName = document.getElementById('parent-name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const consent = document.getElementById('consent').checked;

    if (!school) { alert('학교를 검색하여 선택해 주세요.'); return; }
    if (!grade) { alert('학년을 선택해 주세요.'); return; }
    if (!classNum) { alert('반을 입력해 주세요.'); return; }

    const cs = parseInt(classSize);
    if (!classSize || isNaN(cs) || cs < 1 || cs > 35) {
      alert('학급 인원수는 1~35명 사이로 입력해 주세요.');
      return;
    }
    if (!parentName) { alert('보호자 이름을 입력해 주세요.'); return; }
    if (phone.replace(/\D/g,'').length < 10) { alert('연락처를 정확히 입력해 주세요.'); return; }
    if (!consent) { alert('개인정보 수집 및 이용에 동의해 주세요.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '제출 중...';

    const payload = {
      school, schoolCode, region, address,
      grade, classNum, classSize: cs,
      parentName, phone,
      timestamp: new Date().toLocaleString('ko-KR')
    };

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    })
    .then(() => {
      hide('step-form');
      show('step-done');
    })
    .catch(() => {
      hide('step-form');
      show('step-done');
    });
  }

  // ── 색종이 ───────────────────────────────────────
  function spawnConfetti() {
    const container = document.getElementById('confetti-container');
    container.innerHTML = '';
    const colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#F1948A','#F7DC6F','#BB8FCE','#82E0AA','#FF9FF3'];
    for (let i = 0; i < 120; i++) {
      const piece = document.createElement('div');
      piece.classList.add('confetti-piece');
      const color = colors[Math.floor(Math.random() * colors.length)];
      const type = Math.floor(Math.random() * 3);
      const size = 7 + Math.random() * 11;
      piece.style.left = (Math.random() * 100) + '%';
      piece.style.animationDelay = (Math.random() * 1.2) + 's';
      piece.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
      piece.style.backgroundColor = color;
      if (type === 0) { piece.style.width = size+'px'; piece.style.height = (size*1.3)+'px'; piece.style.borderRadius = '2px'; }
      else if (type === 1) { piece.style.width = size+'px'; piece.style.height = size+'px'; piece.style.borderRadius = '50%'; }
      else { piece.style.width = (size*0.35)+'px'; piece.style.height = (size*2.5)+'px'; piece.style.borderRadius = '2px'; }
      container.appendChild(piece);
    }
    setTimeout(() => { container.innerHTML = ''; }, 5000);
  }
</script>
</body>
