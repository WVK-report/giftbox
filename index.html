<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>선물상자 이벤트</title>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    .phone {
      position: relative;
      width: 100vw;
      max-width: 430px;
      height: 100vh;
      overflow: hidden;
      background-image: url('https://i.imgur.com/KASJTsw.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .phone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.18);
      z-index: 0;
    }

    #confetti-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-30px) rotate(0deg);   opacity: 1; }
      50%  { transform: translateY(50vh)  rotate(400deg); opacity: 1; }
      100% { transform: translateY(115vh) rotate(720deg); opacity: 0; }
    }

    .confetti-piece {
      position: absolute;
      top: -30px;
      opacity: 0;
      animation: confettiFall linear forwards;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 32px;
      text-align: center;
    }

    .box-wrap {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .box-img {
      width: 260px;
      height: 260px;
      object-fit: contain;
    }

    @keyframes shake {
      0%   { transform: rotate(0deg)  translateY(0px)   scale(1);    }
      10%  { transform: rotate(-5deg) translateY(-6px)  scale(1.03); }
      20%  { transform: rotate(5deg)  translateY(-11px) scale(1.05); }
      30%  { transform: rotate(-7deg) translateY(-6px)  scale(1.05); }
      40%  { transform: rotate(7deg)  translateY(-13px) scale(1.07); }
      50%  { transform: rotate(-8deg) translateY(-6px)  scale(1.07); }
      60%  { transform: rotate(8deg)  translateY(-13px) scale(1.08); }
      70%  { transform: rotate(-7deg) translateY(-6px)  scale(1.07); }
      80%  { transform: rotate(5deg)  translateY(-8px)  scale(1.05); }
      90%  { transform: rotate(-3deg) translateY(-3px)  scale(1.02); }
      100% { transform: rotate(0deg)  translateY(0px)   scale(1);    }
    }

    @keyframes popIn {
      0%   { transform: scale(0.1) rotate(-15deg); opacity: 0; }
      55%  { transform: scale(1.22) rotate(4deg);  opacity: 1; }
      78%  { transform: scale(0.93) rotate(-2deg); }
      100% { transform: scale(1)    rotate(0deg);  opacity: 1; }
    }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .anim-shake { animation: shake 1.3s ease-in-out forwards; }
    .anim-pop   { animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    .banner-text {
      font-size: 18px;
      line-height: 1.8;
      color: #fff;
      font-weight: 700;
      margin-bottom: 32px;
      word-break: keep-all;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
    }

    .banner-text .sub {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      margin-top: 6px;
    }

    .result-title {
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 10px;
      animation: fadeUp 0.5s ease forwards;
    }
    .result-title.win  { color: #FFD700; text-shadow: 0 2px 16px rgba(255,215,0,0.7); }
    .result-title.lose { color: #ccc;    text-shadow: 0 2px 8px rgba(0,0,0,0.5); }

    .result-sub {
      font-size: 16px;
      color: rgba(255,255,255,0.92);
      line-height: 1.7;
      margin-bottom: 24px;
      word-break: keep-all;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .btn {
      background: #FEE500;
      color: #3B1E08;
      border: none;
      border-radius: 16px;
      padding: 18px 28px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
      transition: transform 0.12s, box-shadow 0.12s;
      letter-spacing: -0.3px;
    }
    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .btn-group {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-outline {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      padding: 16px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      backdrop-filter: blur(4px);
      transition: transform 0.12s, background 0.12s;
      letter-spacing: -0.3px;
    }
    .btn-outline:active {
      transform: scale(0.96);
      background: rgba(255,255,255,0.25);
    }

    .hidden { display: none !important; }

    .step {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

<div class="phone">
  <div id="confetti-container"></div>

  <div class="content">

    <!-- STEP 1: 배너 -->
    <div class="step" id="step-banner">
      <div class="box-wrap">
        <img class="box-img" src="https://i.imgur.com/pqUst9E.jpg" alt="선물상자" />
      </div>
      <p class="banner-text">
        이 상자, 우리 반 전원의<br>선물일지도 몰라요.
        <span class="sub">공유하고 열어보세요 🎁</span>
      </p>
      <button class="btn" onclick="doKakaoShare()">카카오톡으로 공유하기</button>
    </div>

    <!-- STEP 2: 공유 확인 -->
    <div class="step hidden" id="step-confirm">
      <div class="box-wrap">
        <img class="box-img" src="https://i.imgur.com/pqUst9E.jpg" alt="선물상자" />
      </div>
      <p class="banner-text">
        친구에게 공유했나요? 🎁
        <span class="sub">전송 후 아래 버튼을 눌러주세요</span>
      </p>
      <button class="btn" onclick="openBox()">네! 상자 열어보기 💛</button>
    </div>

    <!-- STEP 3: 흔들기 -->
    <div class="step hidden" id="step-shake">
      <div class="box-wrap">
        <img class="box-img" id="box-shaking" src="https://i.imgur.com/pqUst9E.jpg" alt="흔들리는 상자" />
      </div>
      <p class="banner-text">두근두근...! 🎁</p>
    </div>

    <!-- STEP 4: 열리는 중 -->
    <div class="step hidden" id="step-opening">
      <div class="box-wrap">
        <img class="box-img anim-pop" id="img-opening" src="https://i.imgur.com/tYowSVy.jpg" alt="열리는 상자" />
      </div>
      <p class="banner-text">열리고 있어요...! ✨</p>
    </div>

    <!-- STEP 5: 결과 -->
    <div class="step hidden" id="step-result">
      <div class="box-wrap">
        <img class="box-img anim-pop" id="result-img" src="https://i.imgur.com/Nr2I9JG.jpg" alt="결과" />
      </div>
      <p class="result-title" id="result-title"></p>
      <p class="result-sub"   id="result-sub"></p>

      <!-- 당첨 버튼 -->
      <div class="btn-group hidden" id="btn-win-group">
        <button class="btn" onclick="resetAll()">다시 테스트</button>
      </div>

      <!-- 꽝 버튼 -->
      <div class="btn-group hidden" id="btn-lose-group">
        <button class="btn" onclick="doKakaoShare()">한 번 더 공유하기</button>
      </div>
    </div>

  </div>
</div>

<script>
  Kakao.init('2a06402bffbfd011de0c92d6a8a3989a');

  // 결과 페이지 OG 이미지 가져오기 (없으면 기본 이미지)
  function getOgImage() {
    const ogImg = document.querySelector('meta[property="og:image"]');
    return ogImg ? ogImg.content : 'https://i.imgur.com/pqUst9E.jpg';
  }

  function doKakaoShare() {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: '우리 아이랑 나는 어떤 마음 유형일까요? 🦁',
        description: '서로 다른 마음 표현 방식, 테스트로 알아보고 선물상자도 열어보세요!',
        imageUrl: getOgImage(),
        link: {
          mobileWebUrl: 'https://wvhome.lovable.app/result',
          webUrl: 'https://wvhome.lovable.app/result',
        },
      },
      buttons: [
        {
          title: '자세히 보기',
          link: {
            mobileWebUrl: 'https://wvhome.lovable.app/result',
            webUrl: 'https://wvhome.lovable.app/result',
          },
        },
        {
          title: '나도 테스트하기',
          link: {
            mobileWebUrl: 'https://wvhome.lovable.app/',
            webUrl: 'https://wvhome.lovable.app/',
          },
        },
      ],
    });

    setTimeout(() => {
      hide('step-banner');
      hide('step-result');
      show('step-confirm');
    }, 1000);
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  function openBox() {
    hide('step-confirm');

    show('step-shake');
    const shakingBox = document.getElementById('box-shaking');
    shakingBox.classList.remove('anim-shake');
    void shakingBox.offsetWidth;
    shakingBox.classList.add('anim-shake');

    setTimeout(() => {
      hide('step-shake');

      const imgOpening = document.getElementById('img-opening');
      imgOpening.classList.remove('anim-pop');
      void imgOpening.offsetWidth;
      imgOpening.classList.add('anim-pop');
      show('step-opening');

      setTimeout(() => {
        hide('step-opening');
        const isWin = Math.random() < 0.5;
        showResult(isWin);
      }, 1000);

    }, 1400);
  }

  function showResult(isWin) {
    const resultImg = document.getElementById('result-img');
    resultImg.classList.remove('anim-pop');
    void resultImg.offsetWidth;
    resultImg.classList.add('anim-pop');

    show('step-result');

    const title = document.getElementById('result-title');
    const sub   = document.getElementById('result-sub');

    document.getElementById('btn-win-group').classList.add('hidden');
    document.getElementById('btn-lose-group').classList.add('hidden');

    if (isWin) {
      title.textContent = '🎉 당첨!';
      title.className   = 'result-title win';
      sub.textContent   = '우리 반 친구들 전원에게 선물이 갑니다!';
      document.getElementById('btn-win-group').classList.remove('hidden');
      spawnConfetti();
    } else {
      title.textContent = '아쉽게도 꽝!';
      title.className   = 'result-title lose';
      sub.textContent   = '한 번 더 공유하면 또 기회가 생겨요 💛';
      document.getElementById('btn-lose-group').classList.remove('hidden');
    }
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti-container');
    container.innerHTML = '';

    const colors = [
      '#FFD700','#FF6B6B','#4ECDC4','#45B7D1',
      '#96CEB4','#FFEAA7','#DDA0DD','#F1948A',
      '#F7DC6F','#BB8FCE','#82E0AA','#FF9FF3'
    ];

    for (let i = 0; i < 120; i++) {
      const piece    = document.createElement('div');
      piece.classList.add('confetti-piece');

      const color    = colors[Math.floor(Math.random() * colors.length)];
      const left     = Math.random() * 100;
      const delay    = Math.random() * 1.2;
      const duration = 2.2 + Math.random() * 1.8;
      const size     = 7 + Math.random() * 11;
      const type     = Math.floor(Math.random() * 3);

      piece.style.left              = left + '%';
      piece.style.animationDelay    = delay + 's';
      piece.style.animationDuration = duration + 's';
      piece.style.backgroundColor   = color;

      if (type === 0) {
        piece.style.width        = size + 'px';
        piece.style.height       = (size * 1.3) + 'px';
        piece.style.borderRadius = '2px';
      } else if (type === 1) {
        piece.style.width        = size + 'px';
        piece.style.height       = size + 'px';
        piece.style.borderRadius = '50%';
      } else {
        piece.style.width        = (size * 0.35) + 'px';
        piece.style.height       = (size * 2.5)  + 'px';
        piece.style.borderRadius = '2px';
      }

      container.appendChild(piece);
    }

    setTimeout(() => { container.innerHTML = ''; }, 5000);
  }

  function resetAll() {
    ['step-banner','step-confirm','step-shake','step-opening','step-result']
      .forEach(id => document.getElementById(id).classList.add('hidden'));

    document.getElementById('btn-win-group').classList.add('hidden');
    document.getElementById('btn-lose-group').classList.add('hidden');
    document.getElementById('confetti-container').innerHTML = '';
    show('step-banner');
  }
</script>

</body>
</html>
